<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Shooter - Minimalist Arcade</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PixiJS CDN (Stable v7) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            overflow: hidden;
            touch-action: none;
        }
        /* 타일 애니메이션 효과 */
        .tile-pop {
            animation: pop 0.15s ease-out;
        }
        @keyframes pop {
            0 { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* 미니멀 네온 글로우 효과 */
        .neon-glow {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }
        .canvas-container {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 스크롤바 방지 */
        ::-webkit-scrollbar {
            display: none;
        }

        /* 세로 높이가 낮은 화면/아이프레임 뷰포트 대응 반응형 레이아웃 */
        @media (max-height: 780px) {
            .card-wrapper {
                padding: 0.75rem !important; /* p-3 */
                gap: 0.75rem !important;
            }
            .canvas-container {
                height: 140px !important;
            }
            #grid-container {
                gap: 6px !important;
                padding: 6px !important;
            }
            .upgrade-btn {
                padding: 0.5rem !important; /* p-2 */
            }
        }

        @media (max-height: 680px) {
            .card-wrapper {
                padding: 0.5rem !important; /* p-2 */
                gap: 0.5rem !important;
            }
            .canvas-container {
                height: 110px !important;
            }
            #grid-container {
                gap: 4px !important;
                padding: 4px !important;
            }
            .upgrade-btn {
                padding: 0.375rem !important; /* p-1.5 */
            }
            .upgrade-btn span {
                font-size: 9px !important;
            }
            .upgrade-btn div {
                margin-top: 0.25rem !important;
                margin-bottom: 0.25rem !important;
                padding: 2px !important;
            }
            .upgrade-btn i {
                width: 16px !important;
                height: 16px !important;
            }
            .header-container {
                padding-bottom: 0.5rem !important;
            }
        }

        @media (max-height: 565px) {
            .card-wrapper {
                max-height: 100vh !important;
                border-radius: 0px !important;
                border: none !important;
            }
            .canvas-container {
                height: 85px !important;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 sm:p-4 select-none">

<div class="card-wrapper w-full max-w-md bg-zinc-950 rounded-3xl p-4 sm:p-6 border border-zinc-900 flex flex-col gap-4 max-h-[96vh] justify-between shadow-2xl relative overflow-hidden">
    
    <!-- 상단 헤더: 코인 및 총 데미지 정보 -->
    <div class="header-container flex items-center justify-between border-b border-zinc-900 pb-3 flex-shrink-0">
        <div class="flex flex-col">
            <span class="text-xs text-zinc-500 uppercase tracking-widest font-semibold">Wallet</span>
            <div class="flex items-center gap-1.5 mt-0.5">
                <i data-lucide="coins" class="w-5 h-5 text-amber-500 animate-pulse"></i>
                <span id="coin-counter" class="text-xl sm:text-2xl font-black text-amber-400">100</span>
                <span class="text-xs text-amber-500/80 font-bold font-mono">G</span>
            </div>
        </div>
        
        <div class="text-center">
            <h1 class="text-base sm:text-lg font-black tracking-tighter text-zinc-300">2048 SHOOTER</h1>
            <span class="text-[10px] text-zinc-600 font-mono">MINIMALIST HYBRID v1.1</span>
        </div>

        <div class="flex flex-col items-end">
            <span class="text-xs text-zinc-500 uppercase tracking-widest font-semibold">Gun DMG</span>
            <div class="flex items-center gap-1.5 mt-0.5">
                <span id="damage-counter" class="text-xl sm:text-2xl font-black text-white">0</span>
                <i data-lucide="zap" class="w-5 h-5 text-zinc-200 fill-zinc-200"></i>
            </div>
        </div>
    </div>

    <!-- 상단 슈팅 게임 영역 (PixiJS가 주입됨, flex-shrink-0 적용으로 소형 디바이스 찌그러짐 현상 해결) -->
    <div class="relative w-full h-[180px] sm:h-[220px] flex-shrink-0 bg-zinc-900/60 rounded-2xl overflow-hidden canvas-container neon-glow">
        <div id="pixi-canvas-holder" class="w-full h-full"></div>
        
        <!-- 오버레이: 적 침공 경고 및 안내 메시지 -->
        <div id="damage-flash" class="absolute inset-0 bg-red-950/40 pointer-events-none opacity-0 transition-opacity duration-150"></div>
        <div id="ui-alert" class="absolute top-2 left-1/2 transform -translate-x-1/2 bg-red-500/90 text-white text-[10px] font-bold px-3 py-1 rounded-full opacity-0 transition-opacity duration-300 shadow-md flex items-center gap-1">
            <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i>
            <span>BREACH PENALTY! -15 COINS</span>
        </div>
    </div>

    <!-- 2048 보드판 영역 (flex-shrink-0 적용으로 무조건적인 레이아웃 유지) -->
    <div class="relative flex flex-col items-center flex-shrink-0">
        <!-- 스와이프 및 상호작용 가능한 보드 컨테이너 -->
        <div id="grid-container" class="w-full bg-zinc-900 rounded-2xl p-2 border border-zinc-800/80 transition-all duration-300 aspect-square flex flex-col justify-between">
            <!-- JS를 통해 동적 생성됨 (4x4 또는 5x5) -->
        </div>
    </div>

    <!-- 하단 조작 및 업그레이드 패널 -->
    <div class="grid grid-cols-3 gap-2.5 flex-shrink-0">
        <!-- 1. 타일 소환 버튼 -->
        <button id="btn-spawn" class="upgrade-btn flex flex-col items-center justify-between p-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 active:scale-95 transition-all rounded-xl disabled:opacity-40 disabled:pointer-events-none group">
            <span class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase group-hover:text-zinc-400">Spawn Tile</span>
            <div class="my-1.5 p-1 bg-zinc-800/80 rounded-lg">
                <i data-lucide="plus-square" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xs font-black text-amber-400" id="spawn-cost-label">10 G</span>
        </button>

        <!-- 2. 확률 강화 버튼 -->
        <button id="btn-upgrade-prob" class="upgrade-btn flex flex-col items-center justify-between p-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 active:scale-95 transition-all rounded-xl disabled:opacity-40 disabled:pointer-events-none group">
            <div class="flex items-center gap-1">
                <span class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase group-hover:text-zinc-400">Upgrade Prob</span>
                <span id="prob-lvl-tag" class="text-[9px] bg-zinc-800 text-zinc-300 px-1 py-0.5 rounded font-mono">Lv.1</span>
            </div>
            <div class="my-1.5 p-1 bg-zinc-800/80 rounded-lg">
                <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400"></i>
            </div>
            <span class="text-xs font-black text-amber-400" id="prob-upgrade-cost">150 G</span>
        </button>

        <!-- 3. 그리드 확장 버튼 -->
        <button id="btn-upgrade-grid" class="upgrade-btn flex flex-col items-center justify-between p-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 active:scale-95 transition-all rounded-xl disabled:opacity-40 disabled:pointer-events-none group">
            <div class="flex items-center gap-1">
                <span class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase group-hover:text-zinc-400">Expand Grid</span>
                <span id="grid-lvl-tag" class="text-[9px] bg-zinc-800 text-zinc-300 px-1 py-0.5 rounded font-mono">4x4</span>
            </div>
            <div class="my-1.5 p-1 bg-zinc-800/80 rounded-lg">
                <i data-lucide="maximize" class="w-5 h-5 text-blue-400"></i>
            </div>
            <span class="text-xs font-black text-amber-400" id="grid-upgrade-cost">1000 G</span>
        </button>
    </div>

    <!-- 확률표 및 터치 조작 안내 -->
    <div class="flex items-center justify-between text-[11px] text-zinc-600 px-1 pt-2 border-t border-zinc-900 flex-shrink-0">
        <span class="flex items-center gap-1">
            <i data-lucide="info" class="w-3.5 h-3.5"></i>
            <span>Drag mouse/touch top screen to aim</span>
        </span>
        <button id="btn-show-prob" class="hover:text-zinc-400 underline decoration-dotted transition-colors flex items-center gap-1">
            <i data-lucide="percent" class="w-3 h-3"></i> 확률표 보기
        </button>
    </div>

</div>

<!-- 확률 정보 팝업 모달 -->
<div id="prob-modal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 max-w-xs w-full shadow-2xl flex flex-col gap-3">
        <div class="flex justify-between items-center pb-2 border-b border-zinc-800">
            <h3 class="text-sm font-black text-zinc-100 flex items-center gap-1">
                <i data-lucide="bar-chart-2" class="w-4 h-4 text-emerald-400"></i> 소환 숫자 확률 정보
            </h3>
            <button id="btn-close-prob" class="text-zinc-500 hover:text-zinc-200">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="space-y-2 text-xs text-zinc-400" id="prob-details-content">
            <!-- 확률 정보가 JS를 통해 동적 생성됨 -->
        </div>
        <button id="btn-close-prob-ok" class="mt-2 w-full py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-bold rounded-xl transition-all">
            확인
        </button>
    </div>
</div>

<script>
// Lucide 아이콘 초기화
lucide.createIcons();

// --- GAME CONFIG & STATE ---
const CONFIG = {
    baseSpawnCost: 10,
    upgradeProbCosts: [150, 400, 1000, 2500], // 레벨별 비용
    upgradeGridCosts: [1000, 3000], // 4x4->5x5, 5x5->6x6
    probTables: {
        1: { 2: 0.90, 4: 0.10 },
        2: { 2: 0.65, 4: 0.25, 8: 0.10 },
        3: { 2: 0.45, 4: 0.35, 8: 0.15, 16: 0.05 },
        4: { 2: 0.30, 4: 0.35, 8: 0.20, 16: 0.10, 32: 0.05 },
        5: { 2: 0.15, 4: 0.25, 8: 0.25, 16: 0.20, 32: 0.10, 64: 0.05 }
    }
};

const State = {
    coins: 100,
    gridSize: 4, // 4 = 4x4, 5 = 5x5
    spawnProbLevel: 1,
    board: [], // NxN Grid
    score: 0,
    totalDamage: 0
};

// --- DOM ELEMENTS ---
const coinCounter = document.getElementById('coin-counter');
const damageCounter = document.getElementById('damage-counter');
const gridContainer = document.getElementById('grid-container');
const btnSpawn = document.getElementById('btn-spawn');
const spawnCostLabel = document.getElementById('spawn-cost-label');
const btnUpgradeProb = document.getElementById('btn-upgrade-prob');
const probLvlTag = document.getElementById('prob-lvl-tag');
const probUpgradeCost = document.getElementById('prob-upgrade-cost');
const btnUpgradeGrid = document.getElementById('btn-upgrade-grid');
const gridLvlTag = document.getElementById('grid-lvl-tag');
const gridUpgradeCost = document.getElementById('grid-upgrade-cost');
const damageFlash = document.getElementById('damage-flash');
const uiAlert = document.getElementById('ui-alert');
const btnShowProb = document.getElementById('btn-show-prob');
const btnCloseProb = document.getElementById('btn-close-prob');
const btnCloseProbOk = document.getElementById('btn-close-prob-ok');
const probModal = document.getElementById('prob-modal');
const probDetailsContent = document.getElementById('prob-details-content');

// --- 2048 GRID LOGIC ---

// 2048 격자 초기 생성
function initGrid() {
    State.board = Array.from({ length: State.gridSize }, () => Array(State.gridSize).fill(0));
    renderGrid();
    updateDamage();
}

// UI 갱신 및 보드 렌더링
function renderGrid() {
    gridContainer.innerHTML = '';
    
    // CSS Grid Column 개수 동적 적용
    if (State.gridSize === 4) {
        gridContainer.className = 'w-full bg-zinc-900 rounded-2xl p-2 border border-zinc-800/80 transition-all duration-300 aspect-square grid grid-cols-4 grid-rows-4 gap-2';
    } else {
        gridContainer.className = 'w-full bg-zinc-900 rounded-2xl p-2 border border-zinc-800/80 transition-all duration-300 aspect-square grid grid-cols-5 grid-rows-5 gap-1.5';
    }

    const tileStyleMap = {
        0: { bg: 'bg-zinc-950/40 border border-zinc-900/50', text: '' },
        2: { bg: 'bg-zinc-800 border border-zinc-700/50 text-zinc-100', text: 'text-lg sm:text-xl font-bold' },
        4: { bg: 'bg-zinc-700 text-zinc-50 shadow-sm', text: 'text-lg sm:text-xl font-bold' },
        8: { bg: 'bg-zinc-600 text-zinc-50 shadow-sm', text: 'text-lg sm:text-xl font-bold' },
        16: { bg: 'bg-zinc-500 text-zinc-50 shadow-sm', text: 'text-lg sm:text-xl font-bold' },
        32: { bg: 'bg-zinc-400 text-zinc-950 shadow-md', text: 'text-lg sm:text-xl font-black' },
        64: { bg: 'bg-zinc-300 text-zinc-950 shadow-md', text: 'text-lg sm:text-xl font-black' },
        128: { bg: 'bg-zinc-200 text-zinc-950 shadow-lg', text: 'text-base sm:text-lg font-black' },
        256: { bg: 'bg-zinc-100 text-zinc-950 shadow-lg', text: 'text-base sm:text-lg font-black' },
        512: { bg: 'bg-white text-zinc-950 shadow-xl ring-2 ring-white/20', text: 'text-base sm:text-lg font-black' },
        1024: { bg: 'bg-amber-400 text-amber-950 shadow-xl ring-4 ring-amber-400/30', text: 'text-sm sm:text-base font-black' },
        2048: { bg: 'bg-yellow-300 text-yellow-950 shadow-2xl ring-4 ring-yellow-300/50 animate-bounce', text: 'text-sm sm:text-base font-black' }
    };

    for (let r = 0; r < State.gridSize; r++) {
        for (let c = 0; c < State.gridSize; c++) {
            const val = State.board[r][c];
            const cell = document.createElement('div');
            
            // 기본 빈칸과 채워진 칸에 맞춘 색상/스타일 할당
            const style = tileStyleMap[val] || { bg: 'bg-yellow-300 text-yellow-950 shadow-2xl ring-4 ring-yellow-300/60', text: 'text-xs sm:text-sm font-black' };
            
            cell.className = `flex items-center justify-center rounded-xl transition-all duration-100 ${style.bg}`;
            
            if (val > 0) {
                const textNode = document.createElement('span');
                textNode.className = `${style.text} tile-pop`;
                textNode.textContent = val;
                cell.appendChild(textNode);
            }
            gridContainer.appendChild(cell);
        }
    }
    updateDamage();
    updateUIButtons();
}

// 2048 폰 방향 및 슬라이드 알고리즘
function transpose(matrix) {
    const n = matrix.length;
    const res = Array.from({ length: n }, () => Array(n).fill(0));
    for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
            res[c][r] = matrix[r][c];
        }
    }
    return res;
}

function reverseRows(matrix) {
    return matrix.map(row => [...row].reverse());
}

function slideLeft(matrix) {
    const n = matrix.length;
    let moved = false;
    const nextMatrix = Array.from({ length: n }, () => Array(n).fill(0));

    for (let r = 0; r < n; r++) {
        // 0이 아닌 타일만 추출
        let row = matrix[r].filter(val => val !== 0);
        const nextRow = [];
        
        // 인접 동일 타일 병합
        for (let i = 0; i < row.length; i++) {
            if (i < row.length - 1 && row[i] === row[i+1]) {
                const combined = row[i] * 2;
                nextRow.push(combined);
                
                // 병합 시 작게나마 골드 보상 추가
                const bonusCoins = Math.max(1, Math.floor(Math.log2(combined)));
                addCoins(bonusCoins);
                
                i++; // 다음 타일 건너뜀
                moved = true;
            } else {
                nextRow.push(row[i]);
            }
        }
        
        // 빈자리 채우기
        while (nextRow.length < n) {
            nextRow.push(0);
        }
        
        nextMatrix[r] = nextRow;
        if (JSON.stringify(matrix[r]) !== JSON.stringify(nextRow)) {
            moved = true;
        }
    }
    return { matrix: nextMatrix, moved };
}

function handleMove(direction) {
    let current = State.board;
    let result;
    
    if (direction === 'LEFT') {
        result = slideLeft(current);
    } else if (direction === 'RIGHT') {
        const rev = reverseRows(current);
        const slided = slideLeft(rev);
        result = { matrix: reverseRows(slided.matrix), moved: slided.moved };
    } else if (direction === 'UP') {
        const transposed = transpose(current);
        const slided = slideLeft(transposed);
        result = { matrix: transpose(slided.matrix), moved: slided.moved };
    } else if (direction === 'DOWN') {
        const transposed = transpose(current);
        const rev = reverseRows(transposed);
        const slided = slideLeft(rev);
        const unrev = reverseRows(slided.matrix);
        result = { matrix: transpose(unrev), moved: slided.moved };
    }

    if (result && result.moved) {
        State.board = result.matrix;
        renderGrid();
    }
}

// 타일 소환 처리
function summonTile() {
    if (State.coins < CONFIG.baseSpawnCost) return;
    
    const empties = [];
    for (let r = 0; r < State.gridSize; r++) {
        for (let c = 0; c < State.gridSize; c++) {
            if (State.board[r][c] === 0) empties.push({ r, c });
        }
    }
    
    if (empties.length === 0) {
        // 격자가 가득 참
        return;
    }
    
    // 코인 소비
    addCoins(-CONFIG.baseSpawnCost);
    
    // 빈 위치 하나 선정
    const target = empties[Math.floor(Math.random() * empties.length)];
    
    // 현재 확률 설정 기준 수치 할당
    State.board[target.r][target.c] = getRandomSummonValue();
    renderGrid();
}

function getRandomSummonValue() {
    const roll = Math.random();
    const table = CONFIG.probTables[State.spawnProbLevel];
    let sum = 0;
    
    for (const [val, prob] of Object.entries(table)) {
        sum += prob;
        if (roll <= sum) {
            return parseInt(val);
        }
    }
    return 2; // 안전대책
}

// 코인 변경 유틸리티
function addCoins(amount) {
    State.coins += amount;
    if (State.coins < 0) State.coins = 0;
    coinCounter.textContent = State.coins;
    updateUIButtons();
}

// 총 공격력 업데이트
function updateDamage() {
    const sum = State.board.flat().reduce((a, b) => a + b, 0);
    State.totalDamage = sum;
    damageCounter.textContent = sum;
}

// 업그레이드 핸들러
function upgradeProb() {
    const cost = CONFIG.upgradeProbCosts[State.spawnProbLevel - 1];
    if (State.coins >= cost && State.spawnProbLevel < 5) {
        addCoins(-cost);
        State.spawnProbLevel++;
        renderGrid();
    }
}

function upgradeGrid() {
    let cost = 0;
    if (State.gridSize === 4) cost = CONFIG.upgradeGridCosts[0];
    else if (State.gridSize === 5) cost = CONFIG.upgradeGridCosts[1];

    if (cost > 0 && State.coins >= cost) {
        addCoins(-cost);
        // 기존 타일 유지하며 맵 확장
        const oldBoard = State.board;
        State.gridSize++;
        State.board = Array.from({ length: State.gridSize }, () => Array(State.gridSize).fill(0));
        
        // 이전 데이터 복사
        for (let r = 0; r < oldBoard.length; r++) {
            for (let c = 0; c < oldBoard[r].length; c++) {
                State.board[r][c] = oldBoard[r][c];
            }
        }
        renderGrid();
    }
}

// UI 버튼 활성화 유무 제어
function updateUIButtons() {
    // 1. 소환 버튼 제어
    const empties = State.board.flat().filter(val => val === 0).length;
    btnSpawn.disabled = (State.coins < CONFIG.baseSpawnCost || empties === 0);
    
    // UX 폴리시: 데미지가 0일 때 (게임 초기 시작 상태), 첫 스폰을 유도하기 위해 소환 버튼이 빛나도록 스타일 추가
    if (State.totalDamage === 0 && State.coins >= CONFIG.baseSpawnCost) {
        btnSpawn.classList.add('ring-2', 'ring-amber-400', 'animate-pulse');
    } else {
        btnSpawn.classList.remove('ring-2', 'ring-amber-400', 'animate-pulse');
    }
    
    // 2. 확률 강화 제어
    if (State.spawnProbLevel >= 5) {
        probLvlTag.textContent = "Lv.MAX";
        probUpgradeCost.textContent = "MAXED";
        btnUpgradeProb.disabled = true;
    } else {
        const nextCost = CONFIG.upgradeProbCosts[State.spawnProbLevel - 1];
        probLvlTag.textContent = `Lv.${State.spawnProbLevel}`;
        probUpgradeCost.textContent = `${nextCost} G`;
        btnUpgradeProb.disabled = (State.coins < nextCost);
    }
    
    // 3. 그리드 확장 제어
    if (State.gridSize === 6) {
        gridLvlTag.textContent = "6x6 MAX";
        gridUpgradeCost.textContent = "MAXED";
        btnUpgradeGrid.disabled = true;
    } else {
        const costIndex = State.gridSize - 4; // 0 for 4x4 -> 5x5, 1 for 5x5 -> 6x6
        const nextCost = CONFIG.upgradeGridCosts[costIndex];
        gridLvlTag.textContent = `${State.gridSize}x${State.gridSize}`;
        gridUpgradeCost.textContent = `${nextCost} G`;
        btnUpgradeGrid.disabled = (State.coins < nextCost);
    }
}

// 키보드 방향키 바인딩
document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
            handleMove('UP');
            break;
        case 'ArrowDown':
        case 's':
        case 'S':
            handleMove('DOWN');
            break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
            handleMove('LEFT');
            break;
        case 'ArrowRight':
        case 'd':
        case 'D':
            handleMove('RIGHT');
            break;
    }
});

// 스와이프 제어 (모바일 대응)
let touchStartX = 0;
let touchStartY = 0;
gridContainer.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });

gridContainer.addEventListener('touchend', (e) => {
    if (!touchStartX || !touchStartY) return;
    
    const diffX = e.changedTouches[0].clientX - touchStartX;
    const diffY = e.changedTouches[0].clientY - touchStartY;
    const threshold = 40; // 스와이프 기준 임계치 (픽셀)
    
    if (Math.abs(diffX) > Math.abs(diffY)) {
        if (Math.abs(diffX) > threshold) {
            if (diffX > 0) handleMove('RIGHT');
            else handleMove('LEFT');
        }
    } else {
        if (Math.abs(diffY) > threshold) {
            if (diffY > 0) handleMove('DOWN');
            else handleMove('UP');
        }
    }
    touchStartX = 0;
    touchStartY = 0;
}, { passive: true });

// --- PIXIJS SHOOTER CORE SYSTEM ---
let pixiApp;
const enemies = [];
const bullets = [];
const coinsPool = [];
let gunSprite;
let fireTimer = 0;
let enemySpawnTimer = 0;
let targetGunX = 0;

window.onload = function() {
    initGrid();
    initPixiShooter();
    setupModals();
};

function initPixiShooter() {
    const holder = document.getElementById('pixi-canvas-holder');
    
    // 돔 크기 계산 유도를 위해 지연 프레임 처리 (0높이 방지 핵심 기술)
    requestAnimationFrame(() => {
        const width = holder.clientWidth || 300;
        const height = holder.clientHeight || 180;
        
        // PixiJS Application 초기화
        pixiApp = new PIXI.Application({
            width: width,
            height: height,
            backgroundAlpha: 0, // 뒷배경 투명하게 하여 Tailwind 테마와 일치
            resolution: window.devicePixelRatio || 1,
            autoDensity: true,
            antialias: true
        });
        
        holder.appendChild(pixiApp.view);
        targetGunX = width / 2;

        // 1. 총(Gun) 스프라이트 생성
        gunSprite = new PIXI.Graphics();
        gunSprite.beginFill(0xffffff);
        // 미니멀한 삼각형/레이저 건 스타일
        gunSprite.moveTo(0, -12);
        gunSprite.lineTo(8, 6);
        gunSprite.lineTo(-8, 6);
        gunSprite.closePath();
        gunSprite.endFill();
        gunSprite.x = width / 2;
        gunSprite.y = height - 18;
        pixiApp.stage.addChild(gunSprite);

        // 2. 조준을 위한 드래그 및 마우스 인터랙션 바인딩
        const interactionArea = document.getElementById('pixi-canvas-holder');
        
        function setGunXFromPointer(clientX) {
            const rect = interactionArea.getBoundingClientRect();
            const relativeX = clientX - rect.left;
            targetGunX = Math.max(15, Math.min(relativeX, width - 15));
        }
        
        interactionArea.addEventListener('mousemove', (e) => {
            setGunXFromPointer(e.clientX);
        });
        
        interactionArea.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                setGunXFromPointer(e.touches[0].clientX);
            }
        }, { passive: true });

        // 3. 업데이트 루프
        pixiApp.ticker.add((delta) => {
            // 총구 유연한 수평 보간 이동(Lerp)
            gunSprite.x += (targetGunX - gunSprite.x) * 0.25;
            
            // 실시간 뷰포트 변경 대응을 위해 총 위치의 Y축 상시 동기화
            gunSprite.y = pixiApp.screen.height - 18;

            // 발사 로직 (공격력 합계가 0보다 클 때만 발사 가능)
            fireTimer += delta;
            if (fireTimer >= 12 && State.totalDamage > 0) {
                fireBullet();
                fireTimer = 0;
            }

            // 적 스폰 관리
            enemySpawnTimer += delta;
            if (enemySpawnTimer >= 55) { 
                spawnEnemy();
                enemySpawnTimer = 0;
            }

            // 투사체 및 객체 관리
            updateBullets(delta);
            updateEnemies(delta);
            updateCoinsPool(delta);
        });
    });

    // 해상도 조절 리사이즈 감지 (예외 처리 완료)
    window.addEventListener('resize', () => {
        if (pixiApp && pixiApp.renderer && gunSprite) {
            const w = holder.clientWidth;
            const h = holder.clientHeight;
            pixiApp.renderer.resize(w, h);
            gunSprite.y = h - 18;
        }
    });
}

// 총알 생성 및 관리
function fireBullet() {
    if (!gunSprite) return;
    const bullet = new PIXI.Graphics();
    
    // 공격력 높으면 조금 더 굵은 미니멀 빔 생성
    const widthFactor = Math.min(6, 1 + Math.log10(State.totalDamage + 1));
    bullet.beginFill(0xf4f4f5);
    bullet.drawRect(-widthFactor/2, -10, widthFactor, 10);
    bullet.endFill();
    
    bullet.x = gunSprite.x;
    bullet.y = gunSprite.y - 12;
    bullet.damage = State.totalDamage;
    
    bullets.push(bullet);
    pixiApp.stage.addChild(bullet);
}

function updateBullets(delta) {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y -= 7 * delta;
        
        // 화면 외곽 소멸
        if (b.y < -20) {
            pixiApp.stage.removeChild(b);
            bullets.splice(i, 1);
        }
    }
}

// 적 구조 설계 및 생성
function spawnEnemy() {
    if (!pixiApp) return;
    const width = pixiApp.screen.width;
    const enemy = new PIXI.Container();
    
    // 타일 데미지에 비례한 유연한 난이도 스케일링 설정
    const minHp = Math.max(5, Math.floor(State.totalDamage * 0.3));
    const maxHp = Math.max(15, Math.floor(State.totalDamage * 1.5));
    const hp = Math.floor(Math.random() * (maxHp - minHp + 1)) + minHp;
    
    enemy.hp = hp;
    enemy.maxHp = hp;

    // 미니멀 사각형 드로잉
    const shape = new PIXI.Graphics();
    const size = 26;
    shape.lineStyle(1.5, 0xffffff);
    shape.beginFill(0x18181b);
    shape.drawRect(-size/2, -size/2, size, size);
    shape.endFill();
    
    enemy.addChild(shape);
    enemy.graphic = shape;

    // 미니멀 HP 텍스트 드로잉
    const text = new PIXI.Text(hp.toString(), {
        fontFamily: 'Space Grotesk',
        fontSize: 10,
        fill: 0xf4f4f5,
        align: 'center',
        fontWeight: '900'
    });
    text.anchor.set(0.5);
    enemy.addChild(text);
    enemy.txt = text;

    enemy.x = Math.random() * (width - 40) + 20;
    enemy.y = -30;
    
    // 떨어지는 속도 조절
    enemy.speed = 0.8 + Math.random() * 0.7;

    enemies.push(enemy);
    pixiApp.stage.addChild(enemy);
}

function updateEnemies(delta) {
    if (!pixiApp) return;
    const height = pixiApp.screen.height;

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed * delta;

        // 충돌 검사 (총알 vs 적)
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            const dist = Math.hypot(e.x - b.x, e.y - b.y);
            if (dist < 18) {
                // 피격 처리
                e.hp -= b.damage;
                e.txt.text = Math.max(0, e.hp).toString();
                
                // 피격 화이트 플래시 효과
                e.graphic.tint = 0xef4444;
                setTimeout(() => { if (e && e.graphic) e.graphic.tint = 0xffffff; }, 50);

                // 관통 소멸이 아닌 단일 제거
                pixiApp.stage.removeChild(b);
                bullets.splice(j, 1);

                if (e.hp <= 0) {
                    // 격파 보상 코인 드랍
                    const coinAmount = Math.max(2, Math.floor(Math.log10(e.maxHp + 1) * 3) + Math.floor(Math.random()*4));
                    spawnCoinParticles(e.x, e.y, coinAmount);
                    
                    // 파티클 삭제
                    createMinimalExplosion(e.x, e.y);
                    pixiApp.stage.removeChild(e);
                    enemies.splice(i, 1);
                    break;
                }
            }
        }

        // 바닥선 돌파 제재 처리
        if (e.y > height - 12) {
            triggerBreachPenalty();
            pixiApp.stage.removeChild(e);
            enemies.splice(i, 1);
        }
    }
}

// 미니멀 피격 폭발 효과
function createMinimalExplosion(x, y) {
    for (let i = 0; i < 6; i++) {
        const part = new PIXI.Graphics();
        part.beginFill(0xffffff);
        part.drawCircle(0, 0, 1.5 + Math.random()*2);
        part.endFill();
        part.x = x;
        part.y = y;
        part.vx = (Math.random() - 0.5) * 4;
        part.vy = (Math.random() - 0.5) * 4;
        part.alpha = 1;
        part.decay = 0.04 + Math.random() * 0.03;

        pixiApp.stage.addChild(part);
        
        const updateParticle = (delta) => {
            part.x += part.vx * delta;
            part.y += part.vy * delta;
            part.alpha -= part.decay * delta;
            if (part.alpha <= 0) {
                pixiApp.stage.removeChild(part);
                pixiApp.ticker.remove(updateParticle);
            }
        };
        pixiApp.ticker.add(updateParticle);
    }
}

// 코인 타격 회수 연출
function spawnCoinParticles(startX, startY, count) {
    for (let i = 0; i < count; i++) {
        const coin = new PIXI.Graphics();
        coin.beginFill(0xf59e0b);
        coin.drawCircle(0, 0, 3.5);
        coin.endFill();
        
        coin.x = startX + (Math.random() - 0.5) * 20;
        coin.y = startY + (Math.random() - 0.5) * 20;
        
        // 흩뿌림 초기 속도
        coin.vx = (Math.random() - 0.5) * 5;
        coin.vy = -2 - Math.random() * 3;
        
        // 궤도 타겟팅 상태 전환용 타이머
        coin.delay = 15 + Math.random() * 15; 
        
        coinsPool.push(coin);
        pixiApp.stage.addChild(coin);
    }
}

function updateCoinsPool(delta) {
    for (let i = coinsPool.length - 1; i >= 0; i--) {
        const c = coinsPool[i];
        
        if (c.delay > 0) {
            // 사방 비산 상태
            c.x += c.vx * delta;
            c.y += c.vy * delta;
            c.vx *= 0.95;
            c.vy += 0.15 * delta; // 중력 영향
            c.delay -= delta;
        } else {
            // 지갑(좌상단)을 향해 보간 비행
            const targetX = 20;
            const targetY = -40;
            const dx = targetX - c.x;
            const dy = targetY - c.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist < 15) {
                // 흡수 처리 및 코인 증가
                addCoins(1);
                pixiApp.stage.removeChild(c);
                coinsPool.splice(i, 1);
                continue;
            }
            
            // 점진적인 가속 유도
            const speed = 7;
            c.x += (dx / dist) * speed * delta;
            c.y += (dy / dist) * speed * delta;
        }
    }
}

// 침공 방어선 실패 패널티 처리
function triggerBreachPenalty() {
    // 적 침해시 15코인 차감 및 경고 플래시
    addCoins(-15);
    
    damageFlash.style.opacity = '1';
    uiAlert.classList.remove('opacity-0');
    uiAlert.classList.add('opacity-100');
    
    setTimeout(() => {
        damageFlash.style.opacity = '0';
    }, 150);

    setTimeout(() => {
        uiAlert.classList.remove('opacity-100');
        uiAlert.classList.add('opacity-0');
    }, 2000);
}

// 모달 연동 제어
function setupModals() {
    // 모달 표시
    btnShowProb.addEventListener('click', () => {
        // 실시간 업그레이드 수치에 따른 확률 현황 동적 바인딩
        const table = CONFIG.probTables[State.spawnProbLevel];
        let html = `<p class="font-bold mb-2 text-zinc-200">현재 레벨 (Lv.${State.spawnProbLevel}) 소환 확률</p>`;
        
        for (const [val, prob] of Object.entries(table)) {
            html += `
                <div class="flex justify-between items-center py-1 border-b border-zinc-800">
                    <span class="font-bold text-zinc-100 bg-zinc-800 px-1.5 py-0.5 rounded">${val}</span>
                    <span class="font-mono text-zinc-300">${(prob * 100).toFixed(0)}%</span>
                </div>
            `;
        }
        
        if (State.spawnProbLevel < 5) {
            const nextTable = CONFIG.probTables[State.spawnProbLevel + 1];
            html += `<p class="font-bold mt-4 mb-2 text-zinc-400">다음 레벨 (Lv.${State.spawnProbLevel + 1}) 변경 수치</p>`;
            for (const [val, prob] of Object.entries(nextTable)) {
                html += `
                    <div class="flex justify-between items-center py-1 border-b border-zinc-800/40 text-zinc-500">
                        <span class="font-semibold">${val}</span>
                        <span class="font-mono">${(prob * 100).toFixed(0)}%</span>
                    </div>
                `;
            }
        }
        
        probDetailsContent.innerHTML = html;
        probModal.classList.remove('hidden');
    });

    const hideModal = () => probModal.classList.add('hidden');
    
    btnCloseProb.addEventListener('click', hideModal);
    btnCloseProbOk.addEventListener('click', hideModal);
    probModal.addEventListener('click', (e) => {
        if (e.target === probModal) hideModal();
    });

    // 버튼 액션 연동
    btnSpawn.addEventListener('click', summonTile);
    btnUpgradeProb.addEventListener('click', upgradeProb);
    btnUpgradeGrid.addEventListener('click', upgradeGrid);
}
