<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랭킹 시스템</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #22222a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #a78bfa;
      --accent2: #7c3aed;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --green: #34d399;
      --red: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 720px;
      padding: 2.5rem 1.5rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    #user-section { display: flex; align-items: center; gap: 12px; }

    #user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      display: none;
    }

    #user-name {
      font-size: 0.85rem;
      color: var(--muted);
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-google {
      background: #fff;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent2);
      color: #fff;
    }

    .btn-logout {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 14px;
    }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: 720px;
      padding: 0 1.5rem 4rem;
    }

    /* ── Login screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.5rem;
      text-align: center;
    }

    #login-screen h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    #login-screen h1 span { color: var(--accent); }

    #login-screen p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    /* ── App screen ── */
    #app-screen { display: none; }

    /* ── Score card ── */
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .score-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .score-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #score-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    #score-input::-webkit-outer-spin-button,
    #score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #score-input:focus { border-color: var(--accent); }
    #score-input::placeholder { color: var(--surface2); filter: brightness(2); }

    #my-score-display {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.6rem;
    }
    #my-score-display strong { color: var(--accent); }

    /* ── Ranking list ── */
    .ranking-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .ranking-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    #ranking-count {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    #ranking-list { display: flex; flex-direction: column; gap: 8px; }

    .rank-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .rank-item.is-me {
      border-color: var(--accent);
      background: rgba(167, 139, 250, 0.07);
    }

    .rank-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }
    .rank-num.gold   { color: var(--gold); }
    .rank-num.silver { color: var(--silver); }
    .rank-num.bronze { color: var(--bronze); }
    .rank-num.other  { color: var(--muted); }

    .rank-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-email {
      font-size: 0.73rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-score {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .me-badge {
      font-size: 0.7rem;
      background: var(--accent2);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* ── Loading / Error ── */
    #loading {
      text-align: center;
      color: var(--muted);
      padding: 2rem 0;
      font-size: 0.85rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red);   }

    /* ── Google icon SVG inline ── */
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 0;
    }

    @media (max-width: 480px) {
      #login-screen h1 { font-size: 1.7rem; }
      .rank-email { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">rank<span>↑</span></div>
  <div id="user-section">
    <img id="user-avatar" alt="프로필" />
    <span id="user-name"></span>
    <button class="btn btn-logout" id="logout-btn" style="display:none" onclick="logout()">로그아웃</button>
    <button class="btn btn-google" id="login-btn" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 로그인
    </button>
  </div>
</header>

<main>
  <!-- 로그인 전 화면 -->
  <section id="login-screen">
    <h1>숫자로 겨루는<br/><span>실시간 랭킹</span></h1>
    <p>Google 계정으로 로그인하고<br/>가장 큰 숫자를 입력한 사람이 1위!</p>
    <button class="btn btn-google" style="font-size:1rem; padding:12px 28px;" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/>
      </svg>
      Google로 시작하기
    </button>
  </section>

  <!-- 로그인 후 화면 -->
  <section id="app-screen">
    <div class="score-card">
      <h2>내 점수 입력</h2>
      <div class="score-input-row">
        <input id="score-input" type="number" placeholder="숫자를 입력하세요" min="0" max="999999999" />
        <button class="btn btn-primary" onclick="submitScore()">제출</button>
      </div>
      <p id="my-score-display">현재 점수: <strong>없음</strong></p>
    </div>

    <div class="divider"></div>

    <div class="ranking-header">
      <h2>🏆 실시간 랭킹</h2>
      <span id="ranking-count">0명 참여</span>
    </div>

    <div id="loading">랭킹 불러오는 중...</div>
    <div id="ranking-list"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    collection,
    query,
    orderBy,
    limit,
    onSnapshot,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── Firebase 초기화 ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyCfrkset_cwOR4BPJJF5shBdYP6DcyN-uk",
    authDomain: "test-2f3a5.firebaseapp.com",
    projectId: "test-2f3a5",
    storageBucket: "test-2f3a5.firebasestorage.app",
    messagingSenderId: "218867979944",
    appId: "1:218867979944:web:d722e15b1f9febdbd8149d",
    measurementId: "G-GP725LYTXT"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── 현재 유저 ────────────────────────────────────────────────
  let currentUser = null;
  let unsubscribeRanking = null;

  // ── 인증 상태 감시 ───────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      showApp(user);
      await ensureUserDoc(user);
      subscribeRanking();
      loadMyScore(user.uid);
    } else {
      showLogin();
      if (unsubscribeRanking) { unsubscribeRanking(); unsubscribeRanking = null; }
    }
  });

  // ── Firestore: 유저 문서 생성/업데이트 ──────────────────────
  async function ensureUserDoc(user) {
    const ref = doc(db, "scores", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid:       user.uid,
        name:      user.displayName || "익명",
        email:     user.email       || "",
        photoURL:  user.photoURL    || "",
        score:     null,
        updatedAt: serverTimestamp()
      });
    } else {
      // 프로필 정보 최신 동기화 (점수는 건드리지 않음)
      await setDoc(ref, {
        name:      user.displayName || "익명",
        email:     user.email       || "",
        photoURL:  user.photoURL    || "",
        updatedAt: serverTimestamp()
      }, { merge: true });
    }
  }

  // ── Firestore: 내 점수 로드 ──────────────────────────────────
  async function loadMyScore(uid) {
    const snap = await getDoc(doc(db, "scores", uid));
    if (snap.exists()) {
      const d = snap.data();
      const el = document.getElementById("my-score-display");
      el.innerHTML = d.score !== null
        ? `현재 점수: <strong>${d.score.toLocaleString()}</strong>`
        : `현재 점수: <strong>없음</strong>`;
    }
  }

  // ── Firestore: 점수 제출 ─────────────────────────────────────
  window.submitScore = async () => {
    if (!currentUser) return;
    const raw = document.getElementById("score-input").value.trim();
    if (raw === "") { showToast("숫자를 입력해주세요.", "error"); return; }
    const num = Number(raw);
    if (!Number.isFinite(num) || num < 0 || num > 999_999_999) {
      showToast("0 ~ 999,999,999 사이의 숫자를 입력해주세요.", "error");
      return;
    }

    try {
      await setDoc(doc(db, "scores", currentUser.uid), {
        score:     num,
        updatedAt: serverTimestamp()
      }, { merge: true });

      document.getElementById("score-input").value = "";
      document.getElementById("my-score-display").innerHTML =
        `현재 점수: <strong>${num.toLocaleString()}</strong>`;
      showToast("점수가 저장되었습니다! 🎉", "success");
    } catch (e) {
      console.error(e);
      showToast("저장 실패: " + e.message, "error");
    }
  };

  // ── Firestore: 실시간 랭킹 구독 ─────────────────────────────
  function subscribeRanking() {
    const q = query(
      collection(db, "scores"),
      orderBy("score", "desc"),
      limit(50)
    );

    unsubscribeRanking = onSnapshot(q, (snap) => {
      document.getElementById("loading").style.display = "none";
      const list = document.getElementById("ranking-list");
      list.innerHTML = "";

      const validDocs = snap.docs.filter(d => d.data().score !== null);
      document.getElementById("ranking-count").textContent = `${validDocs.length}명 참여`;

      if (validDocs.length === 0) {
        list.innerHTML = `<div class="empty">아직 점수를 입력한 유저가 없어요.</div>`;
        return;
      }

      validDocs.forEach((docSnap, i) => {
        const d = docSnap.data();
        const isMe = currentUser && docSnap.id === currentUser.uid;
        const rank = i + 1;

        let rankClass = "other";
        let rankLabel = `${rank}`;
        if (rank === 1) { rankClass = "gold";   rankLabel = "🥇"; }
        if (rank === 2) { rankClass = "silver"; rankLabel = "🥈"; }
        if (rank === 3) { rankClass = "bronze"; rankLabel = "🥉"; }

        const item = document.createElement("div");
        item.className = "rank-item" + (isMe ? " is-me" : "");
        item.innerHTML = `
          <div class="rank-num ${rankClass}">${rankLabel}</div>
          <img class="rank-avatar"
               src="${d.photoURL || defaultAvatar(d.name)}"
               alt="${escHtml(d.name)}"
               onerror="this.src='${defaultAvatar(d.name)}'" />
          <div class="rank-info">
            <div class="rank-name">${escHtml(d.name)}${isMe ? ' <span class="me-badge">나</span>' : ''}</div>
            <div class="rank-email">${escHtml(d.email)}</div>
          </div>
          <div class="rank-score">${d.score.toLocaleString()}</div>
        `;
        list.appendChild(item);
      });
    }, (err) => {
      console.error(err);
      document.getElementById("loading").textContent = "랭킹을 불러올 수 없습니다.";
    });
  }

  // ── Google 로그인 ─────────────────────────────────────────────
  window.loginWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      if (e.code === "auth/popup-closed-by-user") return;
      if (e.code === "auth/popup-blocked") {
        showToast("팝업이 차단됐습니다. 브라우저 설정에서 팝업을 허용해주세요.", "error");
        return;
      }
      showToast("로그인 실패: " + e.code, "error");
      console.error(e);
    }
  };

  // ── 로그아웃 ──────────────────────────────────────────────────
  window.logout = async () => {
    await signOut(auth);
    showToast("로그아웃 되었습니다.", "");
  };

  // ── UI 헬퍼 ──────────────────────────────────────────────────
  function showApp(user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display  = "block";
    document.getElementById("login-btn").style.display   = "none";
    document.getElementById("logout-btn").style.display  = "block";
    document.getElementById("user-name").style.display   = "block";
    document.getElementById("user-name").textContent     = user.displayName || user.email;
    const av = document.getElementById("user-avatar");
    if (user.photoURL) { av.src = user.photoURL; av.style.display = "block"; }
  }

  function showLogin() {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-screen").style.display   = "none";
    document.getElementById("login-btn").style.display    = "flex";
    document.getElementById("logout-btn").style.display   = "none";
    document.getElementById("user-name").style.display    = "none";
    document.getElementById("user-avatar").style.display  = "none";
    document.getElementById("ranking-list").innerHTML     = "";
    document.getElementById("loading").style.display      = "block";
    document.getElementById("loading").textContent        = "랭킹 불러오는 중...";
  }

  function defaultAvatar(name) {
    const c = encodeURIComponent((name || "?")[0].toUpperCase());
    return `https://ui-avatars.com/api/?name=${c}&background=7c3aed&color=fff&size=80`;
  }

  function escHtml(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  let toastTimer = null;
  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove("show"); }, 2800);
  }

  // Enter 키로 점수 제출
  document.getElementById("score-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") window.submitScore();
  });
</script>
</body>
</html>
